                                                            });
                                                        }}
                                                        className={`w-full text-left text-[11px] px-3 py-2 rounded border ${
                                                            tenantConfig.activePersonaId === p.id
                                                                ? "border-emerald-500/60 bg-emerald-500/10 text-emerald-100"
                                                                : "border-white/10 bg-white/0 text-white/40"
                                                        }`}
                                                    >
                                                        <div className="font-semibold">{p.label}</div>
                                                        <div className="text-[10px] text-white/40">
                                                            {p.role} · {p.tone}
                                                        </div>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="glass p-5 rounded border border-white/10 space-y-3">
                                            <h3 className="text-xs mono text-white/40 uppercase tracking-[0.2em]">SCENARIO_LIBRARY</h3>
                                            <p className="text-[11px] text-white/40 mb-2">
                                                Select which scenarios you want to explicitly enable. If none are selected, all scenarios remain available.
                                            </p>
                                            <div className="space-y-2 max-h-64 overflow-y-auto pr-2">
                                                {allScenarios.map((s) => {
                                                    const enabledSet = tenantConfig.enabledScenarioIds;
                                                    const isExplicit = Array.isArray(enabledSet) && enabledSet.length > 0;
                                                    const isActive = !isExplicit || enabledSet.includes(s.id);
                                                    return (
                                                        <button
                                                            key={s.id}
                                                            onClick={() => {
                                                                setAdminConfig((previousConfig) => {
                                                                    const activeTenantId = previousConfig.activeTenantId || DEFAULT_TENANT_ID;
                                                                    const previousTenantConfig = getTenantConfig(previousConfig);

                                                                    const current = Array.isArray(previousTenantConfig.enabledScenarioIds)
                                                                        ? previousTenantConfig.enabledScenarioIds
                                                                        : [];

                                                                    const nextList = current.includes(s.id)
                                                                        ? current.filter((id) => id !== s.id)
                                                                        : current.concat(s.id);

                                                                    const updatedTenantConfig = {
                                                                        ...previousTenantConfig,
                                                                        enabledScenarioIds: nextList
                                                                    };

                                                                    const nextConfig = {
                                                                        ...previousConfig,
                                                                        activeTenantId: activeTenantId,
                                                                        tenants: {
                                                                            ...(previousConfig.tenants || {}),
                                                                            [activeTenantId]: updatedTenantConfig
                                                                        }
                                                                    };

                                                                    saveAdminConfig(nextConfig);
                                                                    return nextConfig;
                                                                });
                                                            }}
                                                            className={`w-full text-left text-[11px] px-3 py-2 rounded border ${
                                                                isActive
                                                                    ? "border-sky-500/40 bg-sky-500/10 text-sky-100"
                                                                    : "border-white/10 bg-white/0 text-white/30"
                                                            }`}
                                                        >
                                                            <span className="mono mr-2 text-white/30">{s.id}</span>
                                                            {s.title}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                        <div className="glass p-5 rounded border border-white/10 space-y-3">
                                            <h3 className="text-xs mono text-white/40 uppercase tracking-[0.2em]">EXPERIMENT_TRACKS</h3>
                                            <p className="text-[11px] text-white/40 mb-2">
                                                Opt this tenant into data-driven experiments. Variants are assigned automatically per user or tenant based on the experiment design.
                                            </p>
                                            <div className="space-y-2 max-h-64 overflow-y-auto pr-2">
                                                {EXPERIMENTS.map((exp) => {
                                                    const optInIds = Array.isArray(tenantConfig.experimentOptInIds)
                                                        ? tenantConfig.experimentOptInIds
                                                        : [];
                                                    const isOptedIn = optInIds.includes(exp.id);
                                                    return (
                                                        <button
                                                            key={exp.id}
                                                            onClick={() => {
                                                                setAdminConfig((previousConfig) => {
                                                                    const activeTenantId = previousConfig.activeTenantId || DEFAULT_TENANT_ID;
                                                                    const previousTenantConfig = getTenantConfig(previousConfig);

                                                                    const currentOptIn = Array.isArray(previousTenantConfig.experimentOptInIds)
                                                                        ? previousTenantConfig.experimentOptInIds
                                                                        : [];

                                                                    const nextOptIn = currentOptIn.includes(exp.id)
                                                                        ? currentOptIn.filter((id) => id !== exp.id)
                                                                        : currentOptIn.concat(exp.id);

                                                                    const updatedTenantConfig = {
                                                                        ...previousTenantConfig,
                                                                        experimentOptInIds: nextOptIn
                                                                    };

                                                                    const nextConfig = {
                                                                        ...previousConfig,
                                                                        activeTenantId: activeTenantId,
                                                                        tenants: {
                                                                            ...(previousConfig.tenants || {}),
                                                                            [activeTenantId]: updatedTenantConfig
                                                                        }
                                                                    };

                                                                    saveAdminConfig(nextConfig);
                                                                    return nextConfig;
                                                                });
                                                            }}
                                                            className={`w-full text-left text-[11px] px-3 py-2 rounded border ${
                                                                isOptedIn
                                                                    ? "border-emerald-500/40 bg-emerald-500/10 text-emerald-100"
                                                                    : "border-white/10 bg-white/0 text-white/30"
                                                            }`}
                                                        >
                                                            <div className="flex items-center justify-between gap-2">
                                                                <div>
                                                                    <span className="mono mr-2 text-white/30">{exp.id}</span>
                                                                    <span className="font-semibold">{exp.label}</span>
                                                                </div>
                                                                <span className="mono text-[10px] text-white/40">
                                                                    {isOptedIn ? "ENROLLED" : "NOT_ENROLLED"}
                                                                </span>
                                                            </div>
                                                            {exp.description && (
                                                                <p className="text-[10px] text-white/40 mt-1">
                                                                    {exp.description}
                                                                </p>
                                                            )}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="glass p-5 rounded border border-white/10 space-y-3">
                                        <h3 className="text-xs mono text-white/40 uppercase tracking-[0.2em]">SCENARIO_GOVERNANCE</h3>
                                        <p className="text-[11px] text-white/40 mb-2">
                                            Read-only governance status per scenario. Only approved scenarios can be enabled for production tenants.
                                        </p>
                                        <div className="flex gap-2 mb-3">
                                            <button
                                                onClick={async () => {
                                                    setGovernanceLoading(true);
                                                    const appId = window.__app_id;
                                                    const scenarioIds = visibleScenarios.map((s) => s && s.id).filter(Boolean);
                                                    const next = {};
                                                    for (const scenarioId of scenarioIds) {
                                                        try {
                                                            const gov = await getScenarioGovernance(appId, scenarioId);
                                                            next[scenarioId] = gov;
                                                        } catch (e) {
                                                            next[scenarioId] = null;
                                                        }
                                                    }
                                                    setGovernanceByScenarioId(next);
                                                    setGovernanceLoading(false);
                                                }}
                                                disabled={governanceLoading}
                                                className="px-3 py-1 text-[10px] mono rounded border border-sky-500/60 bg-sky-500/10 text-sky-100 hover:bg-sky-500/20 disabled:opacity-50"
                                            >
                                                {governanceLoading ? "LOADING…" : "REFRESH_GOVERNANCE"}
                                            </button>
                                            <button
                                                onClick={async () => {
                                                    const ok = await seedScenarioGovernance(window.__app_id, "vt1", { governanceStatus: "approved", releaseChannel: "ga" });
                                                    if (ok) {
                                                        const gov = await getScenarioGovernance(window.__app_id, "vt1");
                                                        setGovernanceByScenarioId((prev) => ({ ...prev, vt1: gov }));
                                                    }
                                                }}
                                                className="px-3 py-1 text-[10px] mono rounded border border-amber-500/40 bg-amber-500/10 text-amber-100 hover:bg-amber-500/20"
                                            >
                                                SEED_GOVERNANCE_VT1
                                            </button>
                                        </div>
                                        <div className="space-y-2 max-h-48 overflow-y-auto text-[11px]">
                                            {visibleScenarios.map((s) => {
                                                const gov = governanceByScenarioId[s.id];
                                                const status = gov ? (gov.governanceStatus || "draft") : "No governance record";
                                                const channel = gov && gov.releaseChannel ? gov.releaseChannel : "—";
                                                const tags = Array.isArray(gov && gov.riskTags) ? gov.riskTags : [];
                                                const reviewed = gov && gov.lastReviewedAt ? (typeof gov.lastReviewedAt === "string" ? gov.lastReviewedAt : "set") : "—";
                                                return (
                                                    <div key={s.id} className="flex flex-wrap items-center gap-2 py-2 border-b border-white/5 last:border-b-0">
                                                        <span className="mono text-white/60 w-20 shrink-0">{s.id}</span>
                                                        <span className="font-semibold text-white/90">{s.title}</span>
                                                        <span className={"px-1.5 py-0.5 rounded text-[10px] mono " + (status === "approved" ? "bg-emerald-500/20 text-emerald-200" : status === "draft" ? "bg-white/10 text-white/50" : "bg-amber-500/20 text-amber-200")}>{status}</span>
                                                        <span className="text-white/40 mono text-[10px]">{channel}</span>
                                                        {tags.length > 0 && (
                                                            <span className="flex gap-1 flex-wrap">
                                                                {tags.map((tag) => (
                                                                    <span key={tag} className="px-1.5 py-0.5 rounded bg-white/10 text-white/50 mono text-[9px]">{tag}</span>
                                                                ))}
                                                            </span>
                                                        )}
                                                        {reviewed !== "—" && <span className="text-white/30 text-[9px]">Reviewed: {reviewed}</span>}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                    <ScenarioEditorPanel
                                        allScenarios={allScenarios}
                                        onImportScenario={(scenario) => {
                                            setCustomScenarios((previous) => {
                                                const existing = Array.isArray(previous) ? previous : [];
                                                const without = existing.filter((entry) => entry && entry.id !== scenario.id);
                                                const next = [...without, scenario];
                                                saveCustomScenarios(next);
                                                return next;
                                            });
                                        }}
                                    />
                                </div>
                            )}

                            {view === 'playing' && currentSim && (
                                <div className="max-w-6xl mx-auto flex flex-col lg:flex-row gap-6">
                                    {/* Interaction Panel */}
                                    <div className="flex-1 flex flex-col gap-4">
                                        <div className="glass p-6 md:p-10 rounded-xl relative overflow-hidden border border-sky-500/20">
                                            <div className="absolute top-0 left-0 w-full h-1 bg-sky-500"></div>
                                            <div className="flex justify-between items-center mb-6 mono text-[9px] text-white/30 uppercase">
                                                <span>SIGNAL_0{currentSim.id}</span>
                                                <span className="flex items-center gap-1 text-sky-400"><i data-lucide="zap" className="w-2 h-2 animate-pulse"></i> ACTIVE</span>
                                            </div>
                                            <p className="text-xl md:text-3xl font-light leading-snug crt-flicker mb-10">
                                                {currentSim.nodes[currentNode].scene}
                                            </p>

                                            {Array.isArray(aiFeedback) && aiFeedback.length > 0 && (
                                                <div className="space-y-3 mb-8">
                                                    {aiFeedback.map((entry) => (
                                                        <div
                                                            key={`${entry.personaId}-${entry.heading}`}
                                                            className="bg-sky-500/5 border border-sky-500/20 p-4 rounded-md animate-in fade-in"
                                                        >
                                                            <p className="text-[9px] font-bold text-sky-400 mono mb-2">
                                                                {entry.heading}
                                                            </p>
                                                            <p className="text-xs italic text-white/70 leading-relaxed">
                                                                {entry.text}
                                                            </p>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}

                                            <div className="grid gap-3">
                                                {currentSim.nodes[currentNode].choices?.map((c, i) => (
                                                    <button key={i} onClick={() => handleDecision(c)} className="text-left p-4 md:p-5 bg-white/5 border border-white/10 rounded-lg hover:border-sky-500 hover:bg-sky-500/10 transition-all flex items-center gap-4 group">
                                                        <span className="w-8 h-8 flex-shrink-0 bg-sky-500/20 text-sky-400 flex items-center justify-center mono font-bold text-[10px] border border-sky-500/20 rounded">0{i+1}</span>
                                                        <span className="text-xs md:text-sm">{c.text}</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    {/* Data Stream Sidebar */}
                                    <div className="w-full lg:w-80 space-y-4">
                                        <div className="glass p-5 rounded-lg border border-white/10">
                                            <h4 className="text-[9px] mono text-white/30 uppercase mb-4 tracking-widest">Decision_History</h4>
                                            <div className="space-y-3 max-h-48 lg:max-h-[500px] overflow-y-auto pr-2">
                                                {history.map((h, i) => (
                                                    <div key={i} className="text-[10px] border-l border-white/10 pl-3 py-1">
                                                        <p className="text-white/20 mb-1 mono uppercase">Step_0{i+1}</p>
                                                        <p className="text-white/50 italic leading-relaxed">"{h.choice}"</p>
                                                    </div>
                                                ))}
                                                {history.length === 0 && <p className="text-[10px] text-white/10 mono italic">No steps recorded.</p>}
                                            </div>
                                        </div>

                                        {integrationState.status !== "idle" && (
                                            <div className="glass p-5 rounded-lg border border-white/10">
                                                <h4 className="text-[9px] mono text-white/30 uppercase mb-3 tracking-widest">
                                                    External_Data · {integrationState.status === "loading" ? "Fetching" : "Snapshot"}
                                                </h4>

                                                {integrationState.status === "loading" && (
                                                    <p className="text-[10px] text-white/40">
                                                        Fetching a deterministic external data snapshot for this step…
                                                    </p>
                                                )}

                                                {integrationState.status === "error" && (
                                                    <p className="text-[10px] text-amber-300">
                                                        External data is not available. The simulation has fallen back to safe offline/demo mode.
                                                    </p>
                                                )}

                                                {integrationState.status === "ready" && integrationState.payload && (
                                                    <div className="space-y-2">
                                                        {Object.values(integrationState.payload).map((entry, index) => (
                                                            <div key={index} className="border-l border-white/10 pl-3">
                                                                <p className="text-[9px] mono text-white/40 mb-1 uppercase">
                                                                    {entry.snapshot && entry.snapshot.title ? entry.snapshot.title : "Snapshot"}
                                                                </p>
                                                                <p className="text-[10px] text-white/60">
                                                                    {entry.snapshot && entry.snapshot.narrative
                                                                        ? entry.snapshot.narrative
                                                                        : "Deterministic demo data from the TI console."}
                                                                </p>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        <ToolsPanel
                                            meta={gameState.meta || createMeta()}
                                            scenario={currentSim}
                                            nodeId={currentNode}
                                            integrationState={integrationState}
                                            onToolEvent={(toolEvent) =>
                                                processToolEvent(toolEvent, {
                                                    user,
                                                    adminConfig,
                                                    tenantConfig,
                                                    currentSim,
                                                    currentNode,
                                                    gameState,
                                                    setGameState
                                                })
                                            }
                                            isHighRiskScenario={currentScenarioIsHighRisk}
                                        />
                                    </div>
                                </div>
                            )}

                            {view === 'summary' && (
                                <div className="min-h-[60vh] flex flex-col items-center justify-center text-center px-4">
                                    <div className="w-16 h-16 bg-green-500/20 border border-green-500/40 rounded-full flex items-center justify-center mb-6">
                                        <i data-lucide="check" className="w-8 h-8 text-green-500"></i>
                                    </div>
                                    <h2 className="text-3xl font-bold mb-8">MODULE_SYNCED</h2>
                                    <button onClick={() => setView('dashboard')} className="w-full md:w-auto px-10 py-3 border border-sky-500/50 text-sky-400 mono text-xs rounded hover:bg-sky-500/10 transition-all">RETURN_TO_HUB</button>
                                </div>
                            )}

                        </main>
                    </div>

                    {isGenerating && (
                        <div className="fixed inset-0 bg-ti-dark/90 backdrop-blur-sm z-[100] flex flex-col items-center justify-center text-center p-6 pointer-events-none">
                            <div className="w-10 h-10 border-2 border-sky-500/20 border-t-sky-500 rounded-full animate-spin mb-4"></div>
                            <p className="mono text-[10px] tracking-[0.3em] text-sky-500 animate-pulse">SYNTHESIZING_MENTOR_INTEL...</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TI Simulation & TrainingConsole | Talent Intelligence Collective</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --ti-blue: #0ea5e9; --ti-dark: #030712; --ti-surface: #0f172a; }
        body { 
            background-color: var(--ti-dark); 
            color: #f1f5f9; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
            overscroll-behavior-y: contain;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .bg-grid { 
            background-image: radial-gradient(rgba(14, 165, 233, 0.1) 1px, transparent 0); 
            background-size: 30px 30px; 
        }
        .scanline { 
            width: 100%; height: 100px; z-index: 100; 
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(14, 165, 233, 0.02) 50%, rgba(0, 0, 0, 0) 100%); 
            opacity: 0.1; position: fixed; bottom: 100%; 
            animation: scanline 8s linear infinite; pointer-events: none; 
        }
        @keyframes scanline { 0% { bottom: 100%; } 100% { bottom: -100px; } }
        .crt-flicker { animation: flicker 0.15s infinite; opacity: 0.98; }
        @keyframes flicker { 0% { opacity: 0.985; } 50% { opacity: 0.995; } 100% { opacity: 0.985; } }
        
        /* Custom Scrollbar for desktop */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // PRESERVING YOUR KEYS
        window.__firebase_config = JSON.stringify({
            apiKey: "Paste_the_API_KEY_HERE",
            authDomain: "ti-training-toby.firebaseapp.com",
            projectId: "ti-training-toby",
            storageBucket: "ti-training-toby.firebasestorage.app",
            messagingSenderId: "505114823195",
            appId: "1:505114823195:web:5a704fa69c9c652b8d86be"
        });
        window.__app_id = "ti-simulation-v1";
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import {
            getFirestore,
            doc,
            setDoc,
            getDoc,
            collection,
            getDocs,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const config = JSON.parse(window.__firebase_config);
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.fb = {
            auth,
            db,
            doc,
            setDoc,
            getDoc,
            collection,
            getDocs,
            serverTimestamp,
            signInAnonymously,
            onAuthStateChanged
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const apiKey = "";

        // COMPETENCY, MODULE, PERSONA & LABEL MODEL
        const COMPETENCIES = [
            {
                id: "ti_foundations",
                label: "TI Mandate & Foundations",
                domain: "Talent Intelligence",
                description: "Defines the TI mandate, unifies internal and external data, and articulates value to senior stakeholders.",
                tags: ["BEST PRACTICE", "STRATEGIC", "STRATEGY"]
            },
            {
                id: "data_integrity_ethics",
                label: "Data Integrity & Ethics",
                domain: "People Analytics",
                description: "Protects data quality and applies ethical judgment under pressure.",
                tags: ["INTEGRITY", "ETHICS", "RISK"]
            },
            {
                id: "stakeholder_influence",
                label: "Stakeholder Influence & Storytelling",
                domain: "Talent Intelligence",
                description: "Aligns and persuades senior stakeholders through clear, evidence-based narratives.",
                tags: ["INFLUENCE", "PARTNERSHIP", "STAKEHOLDER_MANAGEMENT", "EXECUTIVE_READY", "NARRATIVE"]
            },
            {
                id: "squad_leadership",
                label: "Squad Leadership & Collaboration",
                domain: "Workforce Planning",
                description: "Leads TI squads, creates psychological safety, and co-creates strategic options.",
                tags: ["TEAM_LEADERSHIP", "PSYCHOLOGICAL_SAFETY", "COURSE_CORRECTION", "OPTIONALITY", "SEEKING_WISDOM"]
            },
            {
                id: "enablement_delivery",
                label: "Enablement & Operational Delivery",
                domain: "Talent Intelligence",
                description: "Builds practical tools and battlecards that change frontline behaviour.",
                tags: ["ENABLEMENT"]
            }
        ];

        const buildTagToCompetencyMap = (competencies) => {
            const map = {};
            competencies.forEach((competency) => {
                (competency.tags || []).forEach((tag) => {
                    if (!tag) {
                        return;
                    }
                    if (!map[tag]) {
                        map[tag] = [];
                    }
                    if (!map[tag].includes(competency.id)) {
                        map[tag].push(competency.id);
                    }
                });
            });
            return map;
        };

        const TAG_TO_COMPETENCY_IDS = buildTagToCompetencyMap(COMPETENCIES);
        const KNOWN_COMPETENCY_TAGS = Object.keys(TAG_TO_COMPETENCY_IDS);
        const KNOWN_COMPETENCY_TAG_SET = new Set(KNOWN_COMPETENCY_TAGS);

        const getCompetencyIdsForTag = (tag) => {
            if (!tag) {
                return [];
            }
            return TAG_TO_COMPETENCY_IDS[tag] || [];
        };

        const getCompetencySummaries = (evidence) => {
            if (!evidence) {
                return [];
            }
            return Object.keys(evidence).map((id) => {
                const entry = evidence[id] || {};
                return {
                    id,
                    count: typeof entry.count === "number" ? entry.count : 0
                };
            }).filter((entry) => entry.count > 0);
        };

        const updateCompetencyEvidence = (previousEvidence, scenarioId, decisions) => {
            const base = previousEvidence || {};
            const next = { ...base };
            if (!Array.isArray(decisions) || decisions.length === 0) {
                return next;
            }
            const timestamp = new Date().toISOString();
            decisions.forEach((decision) => {
                if (!decision || !decision.tag) {
                    return;
                }
                const competencyIds = getCompetencyIdsForTag(decision.tag);
                if (!Array.isArray(competencyIds) || competencyIds.length === 0) {
                    return;
                }
                competencyIds.forEach((competencyId) => {
                    const current = next[competencyId] || { count: 0, lastUpdated: null, lastScenarioId: null };
                    next[competencyId] = {
                        count: current.count + 1,
                        lastUpdated: timestamp,
                        lastScenarioId: scenarioId
                    };
                });
            });
            return next;
        };

        const SDL_SCHEMA_VERSION = 1;

        const MODULES = [
            { id: "core_simulation", name: "Core Simulation Engine", description: "Branching TI scenarios with XP and history.", defaultEnabled: true },
            { id: "mentor_persona", name: "Mentor Persona", description: "Gemini-powered mentor evaluations after key decisions.", defaultEnabled: true },
            { id: "voice_overlay", name: "Voice Overlay", description: "Text-to-speech narration of pivotal scenes.", defaultEnabled: true },
            { id: "team_mode", name: "Virtual Team Mode", description: "Simulations that include virtual team members and a boss persona.", defaultEnabled: false }
        ];

        // WORKSTREAM K – EXPERIMENTATION (data-driven configuration)
        const EXPERIMENTS = [
            {
                id: "exp_scenario_vt1_difficulty",
                label: "VT1 Difficulty Curve Calibration",
                description: "Compare baseline vs slightly harder VT1 scenario variants to calibrate difficulty.",
                kind: "scenario_variant",
                targetScenarioIds: ["vt1"],
                variants: [
                    { id: "control", label: "Baseline content", weight: 1 },
                    { id: "treatment_a", label: "Adjusted difficulty curve", weight: 1 }
                ],
                assignment: {
                    unit: "user"
                }
            },
            {
                id: "exp_persona_mentor_tone",
                label: "Mentor Persona Tone",
                description: "Compare baseline vs more direct mentor persona tone for feedback.",
                kind: "persona_prompt",
                targetPersonaIds: ["mentor"],
                variants: [
                    { id: "baseline", label: "Baseline mentor tone", weight: 1 },
                    { id: "direct", label: "More direct / challenging tone", weight: 1 }
                ],
                assignment: {
                    unit: "tenant"
                }
            }
        ];

        const PERSONAS = [
            {
                id: "mentor",
                label: "Senior TI Mentor",
                role: "External advisor",
                tone: "sharp, concise, supportive",
                perspective: "global talent intelligence and people analytics"
            },
            {
                id: "boss",
                label: "TI Leader / Boss",
                role: "Head of Talent Intelligence",
                tone: "direct, expectation-setting, outcome-focused",
                perspective: "organisational delivery, stakeholder management, political reality"
            },
            {
                id: "peer",
                label: "TI Peer",
                role: "Colleague in TI team",
                tone: "collaborative, practical, experiments-oriented",
                perspective: "messy data, experimentation, trade-offs"
            }
        ];

        // WORKSTREAM H – TOOLS WORKSPACE MODEL
        const TOOL_DEFINITIONS = [
            {
                id: "headcount_planner",
                label: "Headcount Planner",
                description: "What-if calculator for roles, timeline, and capacity.",
                kind: "headcount"
            },
            {
                id: "market_visualizer",
                label: "Market & Comp View",
                description: "Contextual view of market and compensation snapshots linked to the current step.",
                kind: "market"
            },
            {
                id: "evidence_board",
                label: "Evidence Board",
                description: "Notebook space for notes, hypotheses, and links captured during a mission.",
                kind: "notes"
            }
        ];

        const DEFAULT_TOOL_IDS = TOOL_DEFINITIONS.map((tool) => tool.id);

        const getToolDefinition = (toolId) => {
            if (!toolId) {
                return null;
            }
            return TOOL_DEFINITIONS.find((tool) => tool.id === toolId) || null;
        };

        const getToolsForScenario = (scenario, options) => {
            const isHighRisk = options && options.isHighRiskScenario === true;
            let baseIds = DEFAULT_TOOL_IDS;
            if (scenario && scenario.tools && Array.isArray(scenario.tools.enabledToolIds)) {
                const enabled = scenario.tools.enabledToolIds.filter((toolId) =>
                    TOOL_DEFINITIONS.some((tool) => tool.id === toolId)
                );
                baseIds = enabled.length > 0 ? enabled : DEFAULT_TOOL_IDS;
            }
            if (isHighRisk && !baseIds.includes("evidence_board")) {
                return [...baseIds, "evidence_board"];
            }
            return baseIds;
        };

        const ADMIN_STORAGE_KEY_V1 = "ti_admin_config_v1";
        const ADMIN_STORAGE_KEY_V2 = "ti_admin_config_v2";
        const CUSTOM_SCENARIOS_STORAGE_KEY = "ti_custom_scenarios_v1";
        const DEFAULT_TENANT_ID = "default";

        const hashStringToUnitInterval = (input) => {
            if (typeof input !== "string" || input.length === 0) {
                return 0.5;
            }
            let hash = 0;
            for (let index = 0; index < input.length; index += 1) {
                hash = (hash * 31 + input.charCodeAt(index)) >>> 0;
            }
            const normalised = hash % 10000;
            return normalised / 10000;
        };

        const selectVariantForExperiment = (experiment, unitKey) => {
            const safeExperiment = experiment || {};
            const variants = Array.isArray(safeExperiment.variants) && safeExperiment.variants.length > 0
                ? safeExperiment.variants
                : [{ id: "control", label: "Control" }];

            const randomValue = hashStringToUnitInterval(`${safeExperiment.id || "exp"}::${unitKey || "unit"}`);

            const totalWeight = variants.reduce((sum, variant) => {
                const weight = typeof variant.weight === "number" && variant.weight > 0 ? variant.weight : 1;
                return sum + weight;
            }, 0);

            if (totalWeight <= 0) {
                return variants[0].id;
            }

            let threshold = randomValue * totalWeight;
            for (let index = 0; index < variants.length; index += 1) {
                const variant = variants[index];
                const weight = typeof variant.weight === "number" && variant.weight > 0 ? variant.weight : 1;
                if (threshold <= weight) {
                    return variant.id;
                }
                threshold -= weight;
            }

            return variants[variants.length - 1].id;
        };

        const getActiveExperimentsForContext = (params) => {
            const safeParams = params && typeof params === "object" ? params : {};
            const tenantConfig = safeParams.tenantConfig || {};
            const userId = safeParams.userId || null;
            const tenantId = safeParams.tenantId || DEFAULT_TENANT_ID;
            const scenarioId = safeParams.scenarioId || null;

            const optInIds = Array.isArray(tenantConfig.experimentOptInIds)
                ? tenantConfig.experimentOptInIds
                : [];
            if (!Array.isArray(EXPERIMENTS) || EXPERIMENTS.length === 0 || optInIds.length === 0) {
                return {};
            }

            const optInSet = new Set(optInIds);
            const assignments = {};

            EXPERIMENTS.forEach((experiment) => {
                if (!experiment || typeof experiment.id !== "string") {
                    return;
                }
                if (!optInSet.has(experiment.id)) {
                    return;
                }

                const kind = experiment.kind;

                if (kind === "scenario_variant" && scenarioId) {
                    const targets = Array.isArray(experiment.targetScenarioIds)
                        ? experiment.targetScenarioIds
                        : [];
                    if (!targets.includes(scenarioId)) {
                        return;
                    }
                }

                const assignmentConfig = experiment.assignment || {};
                const unit = assignmentConfig.unit === "tenant" ? "tenant" : "user";
                const unitKey = unit === "tenant"
                    ? `tenant:${tenantId || DEFAULT_TENANT_ID}`
                    : `user:${userId || "anonymous"}`;

                const variantId = selectVariantForExperiment(experiment, unitKey);
                if (!variantId) {
                    return;
                }

                assignments[experiment.id] = variantId;
            });

            return assignments;
        };

        const createDefaultTenantConfig = (overrides = {}) => {
            const baseModules = MODULES.reduce((acc, moduleDef) => {
                acc[moduleDef.id] = moduleDef.defaultEnabled;
                return acc;
            }, {});

            return {
                label: overrides.label || "Global Default",
                description: overrides.description || "Baseline configuration for all participants.",
                modules: {
                    ...baseModules,
                    ...(overrides.modules || {})
                },
                enabledScenarioIds: Array.isArray(overrides.enabledScenarioIds) ? overrides.enabledScenarioIds : null,
                activePersonaId: overrides.activePersonaId || "mentor",
                experimentOptInIds: Array.isArray(overrides.experimentOptInIds) ? overrides.experimentOptInIds : []
            };
        };

        const createDefaultAdminState = () => ({
            activeTenantId: DEFAULT_TENANT_ID,
            tenants: {
                [DEFAULT_TENANT_ID]: createDefaultTenantConfig()
            }
        });

        const getTenantConfig = (adminState) => {
            if (!adminState) {
                return createDefaultTenantConfig();
            }

            const tenantId = adminState.activeTenantId || DEFAULT_TENANT_ID;
            const tenants = adminState.tenants || {};
            const existingConfig = tenants[tenantId] || {};

            return createDefaultTenantConfig(existingConfig);
        };

        const loadAdminConfig = () => {
            try {
                const storedV2 = window.localStorage.getItem(ADMIN_STORAGE_KEY_V2);
                if (storedV2) {
                    const parsed = JSON.parse(storedV2);
                    const defaultState = createDefaultAdminState();
                    return {
                        ...defaultState,
                        ...parsed,
                        tenants: {
                            ...defaultState.tenants,
                            ...(parsed.tenants || {})
                        }
                    };
                }

                const legacy = window.localStorage.getItem(ADMIN_STORAGE_KEY_V1);
                if (legacy) {
                    const parsedLegacy = JSON.parse(legacy);
                    const tenantFromLegacy = createDefaultTenantConfig(parsedLegacy);
                    return {
                        activeTenantId: DEFAULT_TENANT_ID,
                        tenants: { [DEFAULT_TENANT_ID]: tenantFromLegacy }
                    };
                }
            } catch (error) {
                // fall through to default
            }

            return createDefaultAdminState();
        };

        const loadCustomScenarios = () => {
            try {
                const stored = window.localStorage.getItem(CUSTOM_SCENARIOS_STORAGE_KEY);
                if (!stored) {
                    return [];
                }

                const parsed = JSON.parse(stored);
                if (!Array.isArray(parsed)) {
                    return [];
                }

                return parsed.filter((scenario) => scenario && typeof scenario.id === "string");
            } catch (error) {
                return [];
            }
        };

        const saveAdminConfig = (config) => {
            try {
                window.localStorage.setItem(ADMIN_STORAGE_KEY_V2, JSON.stringify(config));
            } catch (error) {
                // ignore storage issues
            }
        };

        const getActivePersona = (config) => {
            const tenantConfig = getTenantConfig(config);
            const fallback = PERSONAS[0];
            const match = PERSONAS.find((p) => p.id === tenantConfig.activePersonaId);
            return match || fallback;
        };

        // Event schema v1: optional top-level fields (tenantId, cohortIds, governanceContext, experiments)
        // are additive; readers must treat missing values as "unknown" and must not fail on absent fields.
        const logEvent = async (userId, type, payload, context) => {
            if (!userId || !window.fb || !window.fb.db) {
                return;
            }
            try {
                const nowIso = new Date().toISOString();
                const safePayload = payload && typeof payload === "object" ? payload : {};
                const safeContext = context && typeof context === "object" ? context : {};

                const baseDoc = {
                    type,
                    appId: window.__app_id,
                    userId,
                    createdAt: typeof window.fb.serverTimestamp === "function"
                        ? window.fb.serverTimestamp()
                        : nowIso,
                    clientTime: nowIso,
                    version: 1,
                    payload: safePayload
                };

                const scenarioId = safePayload.scenarioId || null;
                const nodeId = safePayload.nodeId || null;
                const choiceId = safePayload.choiceId || null;
                const personaId = safePayload.personaId || null;
                const labelsBefore = Array.isArray(safePayload.labelsBefore) ? safePayload.labelsBefore : null;
                const labelsAfter = Array.isArray(safePayload.labelsAfter) ? safePayload.labelsAfter : null;
                const xpBefore = typeof safePayload.xpBefore === "number" ? safePayload.xpBefore : null;
                const xpAfter = typeof safePayload.xpAfter === "number" ? safePayload.xpAfter : null;
                const competencyDeltas = safePayload.competencyDeltas && typeof safePayload.competencyDeltas === "object"
                    ? safePayload.competencyDeltas
                    : null;
                const scenarioTags = Array.isArray(safePayload.scenarioTags) ? safePayload.scenarioTags : null;
                const tenantId = typeof safeContext.tenantId === "string" && safeContext.tenantId
                    ? safeContext.tenantId
                    : null;
                const cohortIds = Array.isArray(safeContext.cohortIds) ? safeContext.cohortIds : null;
                const governanceContext = safeContext.governanceContext && typeof safeContext.governanceContext === "object"
                    ? safeContext.governanceContext
                    : null;
                const experiments = safeContext.experiments && typeof safeContext.experiments === "object"
                    ? safeContext.experiments
                    : null;

                if (scenarioId) baseDoc.scenarioId = scenarioId;
                if (nodeId) baseDoc.nodeId = nodeId;
                if (choiceId) baseDoc.choiceId = choiceId;
                if (personaId) baseDoc.personaId = personaId;
                if (labelsBefore) baseDoc.labelsBefore = labelsBefore;
                if (labelsAfter) baseDoc.labelsAfter = labelsAfter;
                if (xpBefore !== null) baseDoc.xpBefore = xpBefore;
                if (xpAfter !== null) baseDoc.xpAfter = xpAfter;
                if (competencyDeltas) baseDoc.competencyDeltas = competencyDeltas;
                if (scenarioTags) baseDoc.scenarioTags = scenarioTags;
                if (tenantId) baseDoc.tenantId = tenantId;
                if (cohortIds && cohortIds.length > 0) baseDoc.cohortIds = cohortIds;
                if (governanceContext && Object.keys(governanceContext).length > 0) baseDoc.governanceContext = governanceContext;
                if (experiments && Object.keys(experiments).length > 0) baseDoc.experiments = experiments;

                await window.fb.setDoc(
                    window.fb.doc(window.fb.db, "events", window.__app_id, "users", userId, nowIso),
                    baseDoc
                );
            } catch (error) {
                // best-effort only
            }
        };

        const getScenarioTagsFromScenario = (scenario) => {
            if (!scenario || !scenario.nodes || typeof scenario.nodes !== "object") {
                return [];
            }
            const tags = [];
            Object.values(scenario.nodes).forEach((node) => {
                if (!node || !Array.isArray(node.choices)) return;
                node.choices.forEach((choiceEntry) => {
                    if (choiceEntry && typeof choiceEntry.tag === "string" && !tags.includes(choiceEntry.tag)) {
                        tags.push(choiceEntry.tag);
                    }
                });
            });
            return tags;
        };

        const PlatformClient = {
            startMission: async (request) => {
                const appId = request && request.appId;
                const userId = request && request.userId;
                const scenarioId = request && request.scenarioId;
                const scenario = (request && request.scenario) || (typeof SCENARIOS !== "undefined" && SCENARIOS.find((s) => s && s.id === scenarioId));
                if (!appId || !scenarioId || !scenario || !scenario.nodes) {
                    return { sessionId: null, node: null, profile: mergeProfileData(null), labels: [] };
                }
                const firstNodeId = "start";
                const node = scenario.nodes[firstNodeId];
                if (!node) {
                    return { sessionId: null, node: null, profile: mergeProfileData(null), labels: [] };
                }
                const sessionId = (request && request.sessionId) || `session_${Date.now()}_${Math.random().toString(36).slice(2)}`;
                const profile = await PlatformClient.getProfile(appId, userId);
                const completedCount = Object.keys(profile.completed || {}).length;
                const labels = computeLabels(profile.xp, completedCount, profile.competencyEvidence);
                const labelIds = labels.map((l) => l && l.id).filter(Boolean);
                const scenarioTags = getScenarioTagsFromScenario(scenario);
                if (userId) {
                    const payload = {
                        scenarioId,
                        title: scenario.title || scenarioId,
                        xpBefore: profile.xp,
                        xpAfter: profile.xp,
                        labelsBefore: labelIds,
                        labelsAfter: labelIds,
                        scenarioTags
                    };
                    const context = { tenantId: (request && request.tenantId) || null, experiments: (request && request.experiments && typeof request.experiments === "object") ? request.experiments : null };
                    await PlatformClient.logEvent(userId, "mission_start", payload, context);
                }
                return { sessionId, node, profile, labels, scenario, firstNodeId };
            },
            submitDecision: async (request) => {
                const appId = request && request.appId;
                const userId = request && request.userId;
                const scenarioId = request && request.scenarioId;
                const nodeId = request && request.nodeId;
                const choice = request && request.choice;
                const profile = request && request.profile;
                const history = request && request.history;
                const scenario = (request && request.scenario) || (typeof SCENARIOS !== "undefined" && SCENARIOS.find((s) => s && s.id === scenarioId));
                if (!appId || !scenarioId || !scenario || !scenario.nodes || !choice || !profile) {
                    return { nextNode: null, profile: profile || mergeProfileData(null), labels: [], terminal: true };
                }
                const nextNode = scenario.nodes[choice.next];
                const terminal = nextNode && nextNode.isEnd === true;
                const nextHistory = Array.isArray(history) ? [...history, { choice: choice.text, tag: choice.tag }] : [{ choice: choice.text, tag: choice.tag }];
                if (userId) {
                    const payload = {
                        scenarioId,
                        nodeId: nodeId || null,
                        choiceText: choice.text,
                        tag: choice.tag || null,
                        competencyIds: getCompetencyIdsForTag(choice.tag)
                    };
                    const context = { tenantId: (request && request.tenantId) || null, experiments: (request && request.experiments && typeof request.experiments === "object") ? request.experiments : null };
                    await PlatformClient.logEvent(userId, "decision_made", payload, context);
                }
                if (terminal) {
                    const xpAwarded = typeof choice.xp === "number" ? choice.xp : 30;
                    const newXp = (profile.xp || 0) + xpAwarded;
                    const newCompleted = { ...(profile.completed || {}), [scenarioId]: true };

            try {

                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: "You are a Senior TI Mentor. Sharp, concise critique (max 2 sentences)." }] } })
                });
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (e) { return "Recalibrating analyzer..."; }
        };

        const playTTS = async (text) => {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text }] }], generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } }, model: "gemini-2.5-flash-preview-tts" })
                });
                const result = await response.json();
                const pcmData = result.candidates[0].content.parts[0].inlineData.data;
                const pcmBuffer = Uint8Array.from(atob(pcmData), c => c.charCodeAt(0)).buffer;
                const wavHeader = new ArrayBuffer(44);
                const view = new DataView(wavHeader);
                const writeString = (o, s) => { for (let i=0; i<s.length; i++) view.setUint8(o+i, s.charCodeAt(i)); };
                writeString(0, 'RIFF'); view.setUint32(4, 32 + pcmBuffer.byteLength, true); writeString(8, 'WAVE');
                writeString(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
                view.setUint32(24, 24000, true); view.setUint32(28, 48000, true); view.setUint16(32, 2, true);
                view.setUint16(34, 16, true); writeString(36, 'data'); view.setUint32(40, pcmBuffer.byteLength, true);
                const audio = new Audio(URL.createObjectURL(new Blob([wavHeader, pcmBuffer], { type: 'audio/wav' })));
                audio.play();
            } catch (e) {}
        };

                setHistory([]);
                setAiFeedback([]);
                setGameState(result.profile || gameState);
                setLabels(result.labels || []);
                setView("playing");
                setIntegrationState({ status: "idle", lastRequest: null, payload: null, error: null });
                if (tenantConfig.modules.voice_overlay && result.node && result.node.scene) {
                    playTTS(result.node.scene);
                }
                if (user && Object.keys(experimentsForMission).length > 0) {
                    await PlatformClient.logEvent(
                        user.uid,
                        "experiment_assignment",
                        { scenarioId: sim.id },
                        { tenantId, experiments: experimentsForMission }
                    );
                }
                runExternalDataHooksForNode(result.scenario || sim, result.firstNodeId || "start");
                getScenarioGovernance(window.__app_id, sim.id)
                    .then((gov) => setCurrentScenarioIsHighRisk(isHighRiskScenario(gov)))
                    .catch(() => setCurrentScenarioIsHighRisk(false));
            };

            const handleDecision = async (choice) => {
                const nextHistory = [...history, { choice: choice.text, tag: choice.tag }];
                setHistory(nextHistory);

                if (tenantConfig.modules.mentor_persona) {
                    setIsGenerating(true);
                    const isTeamMode = currentSim && currentSim.mode === "team";
                    const personaList = isTeamMode
                        ? PERSONAS.filter((persona) => persona.id === "mentor" || persona.id === "boss" || persona.id === "peer")
                        : [getActivePersona(adminConfig)];
                    const meta = gameState.meta || createMeta();
                    const profileSummary = formatProfileSummaryForPrompt(gameState, allScenarios);
                    const historySummary = formatDecisionHistoryForPrompt(nextHistory);
                    const feedbackEntries = [];
                    for (const persona of personaList) {
                        const trustScoreRaw = meta.personaTrust && typeof meta.personaTrust[persona.id] === "number" ? meta.personaTrust[persona.id] : 0;
                        const prompt = `
Persona: ${persona.label} (${persona.role}).
Tone: ${persona.tone}.
Perspective: ${persona.perspective}.

Scenario: ${currentSim.title}.
Current scene: ${currentSim.nodes[currentNode].scene}
Chosen option: ${choice.text}

Profile summary:
${profileSummary}

Mission decision history (including this step):
${historySummary}

Timeline week: ${meta.timelineWeek}.
Organisational risk index: ${meta.orgRisk}.
Current trust score with you (range -100 to 100): ${trustScoreRaw}.

Provide feedback in a maximum of 2 sentences from this persona's point of view.
Focus on decision quality, trade-offs, and how this choice affects long-term trust and team dynamics.`;
                        const text = await PlatformClient.getMentorFeedback(prompt);
                        if (text) {
                            feedbackEntries.push({ personaId: persona.id, heading: getPersonaFeedbackHeading(persona.id), text });
                        }
                    }
                    setAiFeedback(feedbackEntries);
                    setIsGenerating(false);
                }

                const tenantId = adminConfig.activeTenantId || DEFAULT_TENANT_ID;
                const experimentsForMission = user
                    ? getActiveExperimentsForContext({ userId: user.uid, tenantId, scenarioId: currentSim.id, tenantConfig })
                    : {};
                const labelIdsBefore = Array.isArray(labels) ? labels.map((l) => l && l.id).filter(Boolean) : [];
                const result = await PlatformClient.submitDecision({
                    appId: window.__app_id,
                    userId: user ? user.uid : null,
                    scenarioId: currentSim.id,
                    nodeId: currentNode,
                    choiceId: choice.next,
                    choice: { text: choice.text, tag: choice.tag, next: choice.next, xp: choice.xp, effects: choice.effects },
                    profile: gameState,
                    history: nextHistory,
                    scenario: currentSim,
                    tenantId,
                    experiments: Object.keys(experimentsForMission).length > 0 ? experimentsForMission : null,
                    labelsBefore: labels
                });
                setGameState(result.profile);
                setLabels(result.labels);
                if (result.terminal) {
                    setView("summary");
                } else {
                    setCurrentNode(choice.next);
                    const nextNode = currentSim && currentSim.nodes ? currentSim.nodes[choice.next] : null;
                    if (tenantConfig.modules.voice_overlay && nextNode && nextNode.scene) {
                        playTTS(nextNode.scene);
                    }
                    runExternalDataHooksForNode(currentSim, choice.next);
                }
            };

            const getRank = (xp) => {
                if (xp < 500) return "LEVEL_0 · APPRENTICE";
                if (xp < 1500) return "LEVEL_1 · ANALYST";
                if (xp < 3000) return "LEVEL_2 · ADVISOR";
                return "LEVEL_3 · ARCHITECT";
            };

            useEffect(() => { if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons(); }, [view, currentNode, isGenerating]);

            const NavItem = ({ id, icon }) => (
                <button 
                    onClick={() => setView(id)} 
                    className={`flex-1 flex flex-col items-center justify-center gap-1 transition-all ${view === id ? 'text-sky-400' : 'text-white/20'}`}
                >
                    <i data-lucide={icon} className="w-5 h-5"></i>
                    <span className="text-[8px] mono font-bold uppercase">{id}</span>
                </button>
            );

            const AnalyticsView = ({ state, onReload }) => {
                const hasData = Array.isArray(state.scenarioStats) && state.scenarioStats.length > 0;
                const hasVariantData = Array.isArray(state.variantStats) && state.variantStats.length > 0;

                return (
                    <div className="max-w-5xl mx-auto space-y-6 pt-4">
                        <div className="flex items-center justify-between">
                            <h2 className="text-lg font-bold mono border-b border-white/10 pb-4 flex-1">ANALYTICS_OVERVIEW</h2>
                            <button
                                onClick={onReload}
                                className="ml-4 px-3 py-2 text-[10px] mono rounded border border-sky-500/60 bg-sky-500/10 text-sky-100 hover:bg-sky-500/20 transition-colors"
                            >
                                REFRESH_DATA
                            </button>
                        </div>

                        {state.loading && (
                            <p className="text-[11px] text-white/40 mono">Loading analytics from Firestore…</p>
                        )}
                        {state.error && (
                            <p className="text-[11px] text-amber-300 mono">Analytics not available: {state.error}</p>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div className="glass p-4 rounded border border-white/10">
                                <p className="text-[9px] mono text-white/30 mb-1">MISSIONS_STARTED</p>
                                <p className="text-2xl font-bold">{state.totalStarted}</p>
                            </div>
                            <div className="glass p-4 rounded border border-white/10">
                                <p className="text-[9px] mono text-white/30 mb-1">MISSIONS_COMPLETED</p>
                                <p className="text-2xl font-bold">{state.totalCompleted}</p>
                            </div>
                            <div className="glass p-4 rounded border border-white/10">
                                <p className="text-[9px] mono text-white/30 mb-1">COMPLETION_RATE</p>
                                <p className="text-2xl font-bold">
                                    {state.totalStarted === 0
                                        ? "—"
                                        : `${Math.round((state.totalCompleted / state.totalStarted) * 100)}%`}
                                </p>
                            </div>
                        </div>

                        <div className="glass p-5 rounded border border-white/10 space-y-3">
                            <h3 className="text-xs mono text-white/40 uppercase tracking-[0.2em]">SCENARIO_PERFORMANCE · CURRENT_USER</h3>
                            {!hasData && !state.loading && !state.error && (
                                <p className="text-[11px] text-white/30">
                                    No events recorded yet for this user. Once you play missions, per-scenario stats will appear here.
                                </p>
                            )}
                            {hasData && (
                                <div className="space-y-2">
                                    {state.scenarioStats.map((entry) => (
                                        <div
                                            key={entry.scenarioId}
                                            className="flex items-center justify-between text-[11px] bg-white/5 rounded px-3 py-2"
                                        >
                                            <div>
                                                <p className="font-semibold">{entry.title}</p>
                                                <p className="text-white/40 mono">
                                                    {entry.started} started · {entry.completed} completed
                                                </p>
                                            </div>
                                            <div className="text-right mono">
                                                <p className="text-[10px] text-white/40">COMPLETION</p>
                                                <p className="font-bold">
                                                    {entry.started === 0
                                                        ? "—"
                                                        : `${Math.round((entry.completed / entry.started) * 100)}%`}
                                                </p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {hasVariantData && (
                            <div className="glass p-5 rounded border border-white/10 space-y-3">
                                <h3 className="text-xs mono text-white/40 uppercase tracking-[0.2em]">EXPERIMENT_VARIANTS · COMPLETION &amp; XP</h3>
                                <p className="text-[11px] text-white/40">
                                    Breakdown of missions by experiment variant (where experiments were active). Use this to compare completion and XP deltas across variants.
                                </p>
                                <div className="space-y-2 max-h-72 overflow-y-auto pr-2">
                                    {state.variantStats.map((entry) => (
                                        <div
                                            key={`${entry.experimentId}::${entry.scenarioId}::${entry.variantId}`}
                                            className="flex items-center justify-between text-[11px] bg-white/5 rounded px-3 py-2"
                                        >
                                            <div className="flex-1 pr-4">
                                                <p className="font-semibold">
                                                    {entry.title} <span className="text-white/40 mono text-[9px]">({entry.scenarioId})</span>
                                                </p>
                                                <p className="text-white/40 mono text-[10px]">
                                                    EXP: {entry.experimentId} · VARIANT: {entry.variantId}
                                                </p>
                                                <p className="text-white/40 mono text-[10px]">
                                                    {entry.started} started · {entry.completed} completed
                                                </p>
                                            </div>
                                            <div className="text-right mono">
                                                <p className="text-[10px] text-white/40">COMPLETION</p>
                                                <p className="font-bold">
                                                    {entry.started === 0
                                                        ? "—"
                                                        : `${Math.round((entry.completed / entry.started) * 100)}%`}
                                                </p>
                                                <p className="text-[10px] text-white/40 mt-1">AVG_XP_DELTA</p>
                                                <p className="font-bold">
                                                    {typeof entry.avgXpDelta === "number"
                                                        ? `${Math.round(entry.avgXpDelta)}`
                                                        : "—"}
                                                </p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        <div className="glass p-5 rounded border border-dashed border-white/20 space-y-2">
                            <h3 className="text-xs mono text-white/40 uppercase tracking-[0.2em]">FUTURE_VIEWS · TEAM_ANALYTICS</h3>
                            <p className="text-[11px] text-white/40">
                                This prototype focuses on per-user stats. Multi-user cohort analytics, drop-off heatmaps,
                                and label distribution over time can be layered on top of the same event schema in a
                                future multi-tenant backend.
                            </p>
                        </div>
                    </div>
                );
            };

            const ToolsPanel = ({ meta, scenario, nodeId, integrationState, onToolEvent, isHighRiskScenario: isHighRisk }) => {
                const [activeToolId, setActiveToolId] = useState("headcount_planner");
                const [location, setLocation] = useState("Berlin");
                const [roles, setRoles] = useState(60);
                const [months, setMonths] = useState(6);
                const [note, setNote] = useState("");

                const enabledToolIds = getToolsForScenario(scenario, { isHighRiskScenario: isHighRisk === true });
                const toolsToRender = enabledToolIds.length > 0 ? enabledToolIds : DEFAULT_TOOL_IDS;
                const effectiveActiveToolId = toolsToRender.includes(activeToolId)
                    ? activeToolId
                    : toolsToRender[0] || "headcount_planner";

                const safeRoles = Number.isFinite(roles) ? roles : 0;
                const safeMonths = Number.isFinite(months) && months > 0 ? months : 1;

                const monthlyHiringCapacity = 15;
                const projectedTimeToFill = Math.ceil(safeRoles / monthlyHiringCapacity);
                const capacityGap = projectedTimeToFill - safeMonths;

                const scenarioId = scenario && typeof scenario.id === "string" ? scenario.id : null;
                const noteStorageKey = scenarioId ? `ti_tools_notes_${scenarioId}` : null;

                React.useEffect(() => {
                    if (!noteStorageKey) {
                        setNote("");
                        return;
                    }
                    try {
                        const stored = window.localStorage.getItem(noteStorageKey);
                        if (typeof stored === "string") {
                            setNote(stored);
                        } else {
                            setNote("");
                        }
                    } catch (error) {
                        // ignore storage failures
                        setNote("");
                    }
                }, [noteStorageKey]);

                const emitToolEvent = (partial) => {
                    if (!onToolEvent) {
                        return;
                    }
                    const base = partial && typeof partial === "object" ? partial : {};
                    onToolEvent({
                        toolId: base.toolId || effectiveActiveToolId,
                        scenarioId,
                        nodeId: nodeId || null,
                        ...base
                    });
                };

                const applyHeadcountScenario = () => {
                    const riskDelta = capacityGap > 0 ? Math.min(20, capacityGap * 3) : -5;
                    const advanceWeeks = safeMonths * 4;

                    emitToolEvent({
                        toolId: "headcount_planner",
                        kind: "apply_scenario",
                        metaEffects: {
                            orgRiskDelta: riskDelta,
                            advanceWeeks
                        },
                        inputs: {
                            location,
                            roles: safeRoles,
                            months: safeMonths
                        }
                    });
                };

                const handleSaveNote = () => {
                    if (!note || !note.trim()) {
                        return;
                    }

                    if (noteStorageKey) {
                        try {
                            window.localStorage.setItem(noteStorageKey, note);
                        } catch (error) {
                            // best-effort only
                        }
                    }

                    const trimmed = note.trim();
                    const words = trimmed.length > 0 ? trimmed.split(/\s+/) : [];
                    const wordCount = words.length;
                    const hasLinks = trimmed.includes("http://") || trimmed.includes("https://");

                    emitToolEvent({
                        toolId: "evidence_board",
                        kind: "save_note",
                        noteLength: note.length,
                        noteWordCount: wordCount,
                        hasLinks
                    });
                };

                const renderHeadcountPlanner = () => (
                    <div className="space-y-3 text-[11px]">
                        <div className="flex flex-col gap-1">
                            <label className="text-white/40 mono">Target Location</label>
                            <select
                                value={location}
                                onChange={(e) => setLocation(e.target.value)}
                                className="bg-black/40 border border-white/10 rounded px-2 py-1 text-xs"
                            >
                                <option value="Berlin">Berlin</option>
                                <option value="Amsterdam">Amsterdam</option>
                                <option value="Remote-first EU">Remote-first EU</option>
                            </select>
                        </div>
                        <div className="flex flex-col gap-1">
                            <label className="text-white/40 mono">Roles to Fill</label>
                            <input
                                type="number"
                                min="1"
                                max="500"
                                value={roles}
                                onChange={(e) => setRoles(parseInt(e.target.value, 10) || 0)}
                                className="bg-black/40 border border-white/10 rounded px-2 py-1 text-xs"
                            />
                        </div>
                        <div className="flex flex-col gap-1">
                            <label className="text-white/40 mono">Months Available</label>
                            <input
                                type="number"
                                min="1"
                                max="36"
                                value={months}
                                onChange={(e) => setMonths(parseInt(e.target.value, 10) || 1)}
                                className="bg-black/40 border border-white/10 rounded px-2 py-1 text-xs"
                            />
                        </div>

                        <div className="bg-white/5 rounded p-3 space-y-1 text-[10px] mono">
                            <p className="text-white/40">Simulated Capacity · {location}</p>
                            <p className="text-white">
                                {safeRoles} roles in {safeMonths} months →
                                <span className="text-sky-400"> {projectedTimeToFill} months</span> at current capacity
                            </p>
                            <p className={capacityGap > 0 ? "text-amber-300" : "text-emerald-300"}>
                                {capacityGap > 0
                                    ? `Capacity shortfall of ~${capacityGap} months. Organisational risk will increase.`
                                    : "Within capacity envelope. Organisational risk will ease slightly."}
                            </p>
                        </div>

                        <button
                            onClick={applyHeadcountScenario}
                            className="w-full mt-1 px-3 py-2 text-[10px] mono rounded border border-sky-500/40 bg-sky-500/10 text-sky-200 hover:bg-sky-500/20 transition-all"
                        >
                            APPLY_SCENARIO_TO_TIMELINE
                        </button>
                    </div>
                );

                const renderMarketVisualizer = () => {
                    const status = integrationState?.status || "idle";
                    const payload = integrationState?.payload || null;
                    const entries = payload ? Object.values(payload) : [];

                    if (status === "idle") {
                        return (
                            <p className="text-[10px] text-white/40">
                                This tool becomes active when a mission step requests external market or compensation data.
                            </p>
                        );
                    }

                    if (status === "loading") {
                        return (
                            <p className="text-[10px] text-white/40">
                                Fetching a deterministic external data snapshot for this step…
                            </p>
                        );
                    }

                    if (status === "error") {
                        return (
                            <p className="text-[10px] text-amber-300">
                                External data is not available. The simulation is running in offline/demo mode.
                            </p>
                        );
                    }

                    if (!entries || entries.length === 0) {
                        return (
                            <p className="text-[10px] text-white/40">
                                No external market or compensation snapshots are attached to this node.
                            </p>
                        );
                    }

                    return (
                        <div className="space-y-3 text-[10px]">
                            {entries.map((entry, index) => {
                                const snapshot = entry && entry.snapshot ? entry.snapshot : {};
                                const title = snapshot.title || "Snapshot";
                                const narrative = snapshot.narrative || "Deterministic demo data from the TI console.";
                                const comparison = Array.isArray(snapshot.comparison) ? snapshot.comparison : null;
                                const market = snapshot.market || null;
                                const internal = snapshot.internal || null;

                                return (
                                    <div key={index} className="border-l border-white/10 pl-3 space-y-1">
                                        <p className="text-[9px] mono text-white/40 uppercase">{title}</p>
                                        <p className="text-white/70">{narrative}</p>
                                        {comparison && (
                                            <div className="mt-1 space-y-1">
                                                {comparison.map((row, rowIndex) => (
                                                    <p key={rowIndex} className="text-[10px] text-white/60">
                                                        <span className="text-white">{row.location}</span>: pool ≈{" "}
                                                        {row.estimatedTalentPool} · salary index {row.medianSalaryIndex} ·
                                                        competition {row.competitionIndex} — {row.note}
                                                    </p>
                                                ))}
                                            </div>
                                        )}
                                        {market && internal && (
                                            <div className="mt-1 space-y-1">
                                                <p className="text-[10px] text-emerald-300">
                                                    Market median base: {market.medianBase} {market.currency}
                                                </p>
                                                <p className="text-[10px] text-white/60">
                                                    Internal median base: {internal.medianBase} {internal.currency}
                                                </p>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    );
                };

                const renderEvidenceBoard = () => (
                    <div className="space-y-2 text-[11px]">
                        <p className="text-[10px] text-white/50">
                            Capture quick notes, hypotheses, or links you would reference if a stakeholder asked,
                            &ldquo;How did you get to this view?&rdquo;
                        </p>
                        <textarea
                            value={note}
                            onChange={(e) => setNote(e.target.value)}
                            rows={5}
                            className="w-full bg-black/40 border border-white/10 rounded px-2 py-1 text-xs resize-none"
                            placeholder="Example: Key assumptions, caveats, links to docs or dashboards…"
                        />
                        <div className="flex items-center justify-between gap-2 text-[10px] mono text-white/40">
                            <span>{note.length} chars</span>
                            <button
                                onClick={handleSaveNote}
                                className="px-3 py-1 rounded border border-emerald-500/50 bg-emerald-500/10 text-emerald-200 hover:bg-emerald-500/20 transition-all"
                            >
                                SAVE_EVIDENCE_SNAPSHOT
                            </button>
                        </div>
                    </div>
                );

                return (
                    <div className="glass p-5 rounded-lg border border-white/10 space-y-4">
                        <div className="flex items-center justify-between gap-2">
                            <h4 className="text-[9px] mono text-white/30 uppercase tracking-[0.2em]">TI_TOOLS · WORKSPACE</h4>
                        </div>
                        {isHighRisk && (
                            <p className="text-[9px] text-amber-400/90 mono">Evidence board recommended for this scenario.</p>
                        )}
                        <div className="flex gap-1 text-[10px] mono overflow-x-auto">
                            {toolsToRender.map((toolId) => {
                                const def = getToolDefinition(toolId);
                                const isActive = toolId === effectiveActiveToolId;
                                return (
                                    <button
                                        key={toolId}
                                        type="button"
                                        onClick={() => setActiveToolId(toolId)}
                                        className={
                                            "px-2 py-1 rounded border text-xs whitespace-nowrap " +
                                            (isActive
                                                ? "border-sky-500/70 bg-sky-500/20 text-sky-100"
                                                : "border-white/10 bg-black/40 text-white/40 hover:border-sky-500/40 hover:text-sky-200")
                                        }
                                    >
                                        {def ? def.label : toolId}
                                    </button>
                                );
                            })}
                        </div>

                        {effectiveActiveToolId === "headcount_planner" && renderHeadcountPlanner()}
                        {effectiveActiveToolId === "market_visualizer" && renderMarketVisualizer()}
                        {effectiveActiveToolId === "evidence_board" && renderEvidenceBoard()}

                        <div className="border-t border-white/10 pt-3 mt-2 text-[10px] text-white/40 mono">
                            <p>
                                SIM_WEEK: <span className="text-white">{meta.timelineWeek}</span>
                            </p>
                            <p>
                                ORG_RISK: <span className="text-white">{meta.orgRisk}</span>/100
                            </p>
                        </div>
                    </div>
                );
            };

            const ScenarioEditorPanel = ({ allScenarios, onImportScenario }) => {
                const [sdlText, setSdlText] = useState(() => {
                    const example = {
                        schemaVersion: SDL_SCHEMA_VERSION,
                        id: "example_scenario",
                        title: "EXAMPLE MISSION",
                        subtitle: "Replace with your own title",
                        difficulty: "LEVEL 1 · ANALYST",
                        accent: "#38bdf8",
                        xpReward: 100,
                        brief: "Short one-line description of the mission.",
                        nodes: {
                            start: {
                                scene: "Describe the opening situation for the player.",
                                choices: [
                                    {
                                        text: "Example decision that should feel clearly 'good'.",
                                        next: "final",
                                        xp: 30,
                                        tag: "BEST PRACTICE"
                                    }
                                ]
                            },
                            final: {
                                scene: "Describe the outcome once the player reaches the end.",
                                isEnd: true
                            }
                        }
                    };

                    try {
                        return JSON.stringify(example, null, 2);
                    } catch (error) {
                        return "";
                    }
                });

                const [validationResult, setValidationResult] = useState({
                    status: "idle",
                    errors: [],
                    warnings: []
                });

                const [selectedScenarioId, setSelectedScenarioId] = useState("");

                const handleValidate = () => {
                    let parsed;
                    try {
                        parsed = JSON.parse(sdlText);
                    } catch (error) {
                        const message = error instanceof Error ? error.message : "Unknown JSON parse error.";
                        setValidationResult({
                            status: "error",
                            errors: [`SDL is not valid JSON: ${message}`],
                            warnings: []
                        });
                        return;
                    }

                    const result = validateScenarioSDL(parsed);
                    setValidationResult({
                        status: result.isValid ? "ok" : "error",
                        errors: result.errors || [],
                        warnings: result.warnings || []
                    });
                };

                const handleImport = () => {
                    let parsed;
                    try {
                        parsed = JSON.parse(sdlText);
                    } catch (error) {
                        const message = error instanceof Error ? error.message : "Unknown JSON parse error.";
                        setValidationResult({
                            status: "error",
                            errors: [`SDL is not valid JSON: ${message}`],
                            warnings: []
                        });
                        return;
                    }

                    const result = validateScenarioSDL(parsed);
                    setValidationResult({
                        status: result.isValid ? "ok" : "error",
                        errors: result.errors || [],
                        warnings: result.warnings || []
                    });

                    if (!result.isValid || !result.scenario) {
                        return;
                    }

                    if (onImportScenario) {
                        onImportScenario(result.scenario);
                    }
                };

                const handleExportExisting = () => {
                    if (!selectedScenarioId) {
                        return;
                    }
                    const scenario = (allScenarios || []).find((s) => s.id === selectedScenarioId);
                    if (!scenario) {
                        setValidationResult({
                            status: "error",
                            errors: [`No scenario found with id '${selectedScenarioId}'.`],
                            warnings: []
                        });
                        return;
                    }
                    const sdl = scenarioToSDL(scenario);
                    if (!sdl) {

                                            setAnalyticsState((previous) => ({
                                                ...previous,
                                                error: "User or Firestore client not ready."
                                            }));
                                            return;
                                        }
                                        try {
                                            setAnalyticsState((previous) => ({
                                                ...previous,
                                                loading: true,
                                                error: null
                                            }));
                                            const eventsCollectionRef = window.fb.collection(
                                                window.fb.db,
                                                "events",
                                                window.__app_id,
                                                "users",
                                                user.uid
                                            );
                                            const snapshot = await window.fb.getDocs(eventsCollectionRef);
                                            const scenarioAccumulator = {};
                                            const variantAccumulator = {};
                                            let started = 0;
                                            let completed = 0;

                                            snapshot.forEach((docSnap) => {
                                                const data = docSnap.data() || {};
                                                const eventType = data.type;
                                                const scenarioId =
                                                    data.scenarioId ||
                                                    (data.payload && data.payload.scenarioId) ||
                                                    "unknown";
                                                const title =
                                                    (data.payload && data.payload.title) ||
                                                    scenarioId;

                                                if (!scenarioAccumulator[scenarioId]) {
                                                    scenarioAccumulator[scenarioId] = {
                                                        scenarioId,
                                                        title,
                                                        started: 0,
                                                        completed: 0
                                                    };
                                                }

                                                if (eventType === "mission_start") {
                                                    scenarioAccumulator[scenarioId].started += 1;
                                                    started += 1;
                                                }
                                                if (eventType === "mission_complete") {
                                                    scenarioAccumulator[scenarioId].completed += 1;
                                                    completed += 1;
                                                }

                                                const experiments = data.experiments && typeof data.experiments === "object"
                                                    ? data.experiments
                                                    : null;

                                                if (!experiments) {
                                                    return;
                                                }

                                                const xpBeforeTop = typeof data.xpBefore === "number" ? data.xpBefore : null;
                                                const xpAfterTop = typeof data.xpAfter === "number" ? data.xpAfter : null;
                                                const payload = data.payload && typeof data.payload === "object" ? data.payload : {};

                                                const xpBefore = xpBeforeTop !== null ? xpBeforeTop : xpBeforePayload;
                                                const xpAfter = xpAfterTop !== null ? xpAfterTop : xpAfterPayload;

                                                Object.keys(experiments).forEach((experimentId) => {
                                                    const variantId = experiments[experimentId];
                                                    if (!variantId) {
                                                        return;
                                                    }
                                                    const key = `${experimentId}::${scenarioId}::${variantId}`;
                                                    if (!variantAccumulator[key]) {
                                                        variantAccumulator[key] = {

                                                            scenarioId,
                                                            variantId,
                                                            title,
                                                            started: 0,
                                                            completed: 0,
                                                            totalXpDelta: 0,
                                                            completedCount: 0
                                                        };
                                                    }

                                                    }
                                                    if (eventType === "mission_complete") {
                                                        variantAccumulator[key].completed += 1;
                                                        if (typeof xpBefore === "number" && typeof xpAfter === "number") {
                                                            const delta = xpAfter - xpBefore;
                                                            variantAccumulator[key].totalXpDelta += delta;
                                                            variantAccumulator[key].completedCount += 1;
                                                        }
                                                    }
                                                });
                                            });

                                            const scenarioStats = Object.values(scenarioAccumulator).sort(
                                                (a, b) => (b.started || 0) - (a.started || 0)
                                            );

                                                    started: entry.started,
                                                    completed: entry.completed,
